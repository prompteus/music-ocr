kind: "qwen25vl"

image_token_id: 4  # <IMG_PATCH>

text_config:
  num_hidden_layers: 8
  hidden_size: 256
  intermediate_size: 1024
  num_attention_heads: 4
  num_key_value_heads: 4
  rope_parameters:
    rope_theta: 1000000.0
    mrope_section: [8, 12, 12]
  bos_token_id: 1  # <BOS>
  eos_token_id: 3  # <EOS>
  image_token_id: 4  # <IMG_PATCH>
  vocab_size: ~  # filled from tokenizer at train time

vision_config:
  depth: 8
  hidden_size: 256
  intermediate_size: 1024
  num_heads: 4
  in_channels: 1
  patch_size: 16
  spatial_merge_size: 2
  temporal_patch_size: 2
  tokens_per_second: 4
  window_size: 112
  out_hidden_size: 256
  fullatt_block_indexes: [0, 1, 2, 3, 4, 5, 6, 7]
  initializer_range: 0.02
  do_convert_rgb: false
