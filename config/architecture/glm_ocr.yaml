kind: "glm_ocr"

image_token_id: 4  # <IMG_PATCH>
image_start_token_id: 5 # <IMG_START>
image_end_token_id: 6 # <IMG_END>

text_config:
  num_hidden_layers: 8
  hidden_size: 256
  intermediate_size: 1024
  num_attention_heads: 4
  num_key_value_heads: 4
  rope_parameters:
    rope_theta: 1000000.0
  pad_token_id: 0  # <PAD>
  eos_token_id: 3  # <EOS>
  vocab_size: ~  # filled from tokenizer at train time

vision_config:
  depth: 8
  hidden_size: 256
  intermediate_size: 1024
  num_heads: 4
  in_channels: 1
  patch_size: 16
  spatial_merge_size: 2
  temporal_patch_size: 2
  out_hidden_size: 256
  initializer_range: 0.02
