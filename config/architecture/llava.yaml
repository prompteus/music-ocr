kind: "llava"

image_token_index: 4 # <IMG_PATCH>
vision_feature_layer: -1
vision_feature_select_strategy: "default"  # excludes CLS token; n_img_tokens = (H/patch_size) * (W/patch_size)

text_config:
  model_type: "llama"
  num_hidden_layers: 8
  hidden_size: 256
  intermediate_size: 1024
  num_attention_heads: 4
  num_key_value_heads: 4
  vocab_size: ~  # filled from tokenizer at train time
  pad_token_id: 0  # <PAD>
  eos_token_id: 3  # <EOS>
  bos_token_id: 1  # <BOS>

vision_config:
  model_type: "vit"
  num_hidden_layers: 8
  hidden_size: 256
  intermediate_size: 1024
  image_size: [256, 1024]
  patch_size: 16
  num_channels: 1
  num_attention_heads: 4
