defaults:
  - architecture: ~ # fill in before training
  - dataset@train_dataset: synth_omr_500k_train
  - dataset@valid_datasets.synth: synth_omr_500k_val
  - _self_

preprocessor_path: ~ # fill in before training

checkpointing:
  - every_n_train_steps: 25000
    save_top_k: -1
    filename: "step@{step}_periodic"

  - monitor: "synth/loss"
    filename: "step@{step}_ds@synth_metric@loss"
    save_top_k: 3
    mode: "min"

  - monitor: "synth/wer"
    filename: "step@{step}_ds@synth_metric@wer"
    save_top_k: 3
    mode: "min"

torch:
  num_threads: 8
  float32_matmul_precision: "medium"

formatting:
  convert_to: ~ # "ekern", "bekern"

prepare_image:
  max_width: 1024
  max_height: ~

trainer:
  precision: "32-true"
  max_epochs: -1
  max_steps: 1000000
  check_val_every_n_epoch: ~
  val_check_interval: 2500
  gradient_clip_val: 1.0

optimizer:
  kind: "AdamW"
  lr: 1.0e-4

scheduler:
  name: "constant_with_warmup"
  num_warmup_steps: 100

train_loader:
  batch_size: 16
  shuffle: true
  num_workers: 64
  prefetch_factor: 2

valid_loader:
  batch_size: 16
  num_workers: 8
  prefetch_factor: 2

gen_eval:
  max_new_tokens: 1024
  eval_n_examples: 320
